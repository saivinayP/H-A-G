<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="'Run #' + ${runId} + ' — HAG Dashboard'">Live Run</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script th:src="@{/js/theme-toggle.js}"></script>
</head>
<body>
<div class="app-layout">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">⚡ H-A-G</div>
        <a href="/">📊 Dashboard</a>
        <a href="/run">▶️ Run Tests</a>
        <a href="/reports">📋 Reports</a>
        <div class="spacer"></div>
        <div class="bottom-links">
            <a href="/settings">⚙️ Settings</a>
            <a href="/logout">🚪 Logout</a>
            <div style="padding:10px 14px;">
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
        <div class="page-header">
            <h1>
                Run <code th:text="${runId}"></code>
                <span id="runStatus" class="badge badge-running" style="margin-left:12px;">RUNNING</span>
            </h1>
            <p th:if="${run != null}" th:text="'Suite: ' + ${run.suite} + ' | Browser: ' + ${run.browser} + ' | Env: ' + ${run.environment}"></p>
        </div>

        <div class="card" style="padding:0; overflow:hidden;">
            <div class="console" id="liveConsole" th:data-run-id="${runId}">
                Connecting to run stream...
            </div>
        </div>

        <div style="margin-top:16px; display:flex; gap:12px;">
            <a th:href="@{'/reports/' + ${runId} + '/view'}" class="btn btn-success"
               id="reportBtn" style="display:none;" target="_blank">
                📄 View Full Report
            </a>
            <a href="/run" class="btn btn-primary">▶ New Run</a>
            <a href="/" class="btn" style="background:var(--bg); border:1px solid var(--border);">← Dashboard</a>
        </div>
    </main>
</div>

<script th:src="@{/js/live-console.js}"></script>
</body>
</html>
