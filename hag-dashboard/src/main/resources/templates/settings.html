<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Settings — HAG Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script th:src="@{/js/theme-toggle.js}"></script>
</head>
<body>
<div class="app-layout">

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="logo">⚡ H-A-G</div>
        <a href="/">📊 Dashboard</a>
        <a href="/run">▶️ Run Tests</a>
        <a href="/reports">📋 Reports</a>
        <div class="spacer"></div>
        <div class="bottom-links">
            <a href="/settings" class="active">⚙️ Settings</a>
            <a href="/logout">🚪 Logout</a>
            <div style="padding:10px 14px;">
                <button id="themeToggle" class="theme-toggle">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Settings</h1>
            <p>Manage your account and system preferences.</p>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Change Password -->
        <div class="card" style="max-width:500px;    margin-bottom:24px;">
            <h3 style="margin-bottom:16px; font-size:0.95rem;">🔑 Change Password</h3>
            <form action    ="/settings/password" method="post">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword" required/>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" required   minlength="6"/>
                </div>
                <button type="submit" class="btn btn-primary">Update Password</button>
            </form>
        </div>

        <!-- Admin: User Management -->
        <div sec:authorize="hasRole('ADMIN')">
            <div class="card" style="max-width:600px;">
                <h3 style="margin-bottom:16px; font-size:0.95rem;">👥 Create User (Admin)</h3>
                <form action="/admin/users/create" method="post">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username" required/>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" name="password" required minlength="6"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role">
                            <option value="ROLE_USER">User</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
