server:
  port: 9090
  servlet:
    session:
      timeout: 300s   # 300-second inactivity auto-logout

spring:
  application:
    name: hag-dashboard

  # ── Thymeleaf ─────────────────────────────────────────
  thymeleaf:
    cache: false       # disable for dev; set true in prod

  # ── H2 Database ───────────────────────────────────────
  # Swap to MySQL/Postgres by changing these settings.
  datasource:
    url: jdbc:h2:file:./data/hag-dashboard;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

# ── HAG Settings ────────────────────────────────────────
hag:
  project-root: ..                            # path to H-A-G root (relative to hag-dashboard)
  test-root: ../hag-resource/tests            # test CSV root
  results-dir: ../TEST_RESULTS                # HTML report output
  config-dir: ..                              # location of runner.config.yml, url.config.yml
